        function loadContent(categoryId) {
            // 1. Update Navigation Button States
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${categoryId}`).classList.add('active');

            // 2. Get Data
            const data = wasteData[categoryId];
            const displayArea = document.getElementById('content-display');

            // 3. Generate HTML for the compact grid of sub-items
            let itemsHtml = '';
            data.items.forEach((item, index) => {
                const staggerClass = `stagger-${index + 1}`;
                itemsHtml += `
                    <div class="fade-in-up opacity-0 ${staggerClass} bg-white rounded-xl p-4 border border-gray-100 shadow-sm hover:shadow-md transition-shadow flex flex-col sm:flex-row gap-4 items-start relative overflow-hidden group">
                        <!-- Subtle colour accent line on the left -->
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${data.badgeColor.split(' ')[0]} opacity-30 group-hover:opacity-100 transition-opacity"></div>
                        
                        <div class="w-10 h-10 md:w-12 md:h-12 flex-shrink-0 rounded-full bg-brand-bg text-brand-dark flex items-center justify-center border border-gray-200 mt-0.5">
                            <div class="w-5 h-5 md:w-6 md:h-6">${item.icon}</div>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800 mb-1 leading-tight text-sm md:text-base">${item.name}</h3>
                            <p class="text-xs md:text-sm text-gray-600 leading-snug">${item.desc}</p>
                        </div>
                    </div>
                `;
            });

            // 4. Build Full Content Template
            const newContent = `
                <div class="fade-in-up opacity-0 h-full flex flex-col pt-2">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="inline-flex items-center px-2.5 py-1 rounded-md text-[11px] uppercase tracking-wider font-bold text-white shadow-sm ${data.badgeColor}">
                            ${data.badgeText}
                        </span>
                    </div>
                    
                    <h2 class="text-2xl md:text-3xl lg:text-4xl font-bold text-brand-dark tracking-tight mb-3">${data.title}</h2>
                    
                    <p class="text-gray-600 text-sm md:text-base leading-relaxed max-w-3xl mb-6 md:mb-8 pb-6 border-b border-gray-200">
                        ${data.description}
                    </p>

                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Specific Items & Handling</h3>
                    <div class="grid grid-cols-1 xl:grid-cols-2 gap-3 md:gap-4 pb-10">
                        ${itemsHtml}
                    </div>
                </div>
            `;

            // 5. Render
            displayArea.innerHTML = '';
            setTimeout(() => {
                displayArea.innerHTML = newContent;
            }, 20);
        }

        // Initialise default view on load
        window.onload = () => {
            loadContent('general');
        };
    </script>
